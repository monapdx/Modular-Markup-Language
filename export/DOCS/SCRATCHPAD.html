<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCRATCHPAD</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    /* Scratchpad: scoped so it won't fight the exported Obsidian page styles */
    .scratchpad-wrapper {
      width: min(900px, 100%);
      margin: 2rem auto;
      padding: 0 1rem;
      box-sizing: border-box;
    }

    .scratchpad-title {
      margin: 0 0 16px;
      font-size: 2rem;
      line-height: 1.1;
      color: #111;
    }

    .scratchpad {
      min-height: 500px;
      padding: 24px;
      background: #fff;
      border: 4px solid #000;
      box-shadow: 10px 10px 0 #ff2bd6;
      border-radius: 12px;
      font-size: 1.1rem;
      line-height: 1.6;
      outline: none;
      overflow-y: auto;
      white-space: pre-wrap;
      box-sizing: border-box;
    }

    .scratchpad:focus {
      box-shadow: 10px 10px 0 #00e5ff;
    }

    .scratchpad:empty::before {
      content: "Type anything here...";
      color: #999;
      pointer-events: none;
    }
  </style>
  
</head>
<body class="theme-light">
  <main class="markdown-preview-view markdown-rendered">
<div class="metadata-container">
  <div class="metadata-property">
    <span class="metadata-property-key">title</span>
    <span class="metadata-property-value">SCRATCHPAD</span>
  </div>
  <div class="metadata-property">
    <span class="metadata-property-key">category</span>
    <span class="metadata-property-value">notes</span>
  </div>
</div>
<h2></h2>


  </main>
</body>
</html>

</body>
</html>
