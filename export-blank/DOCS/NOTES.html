<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOTES</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="notes-ui.css">
</head>
<body class="theme-light" data-no-doc-editor>
  <main class="markdown-preview-view markdown-rendered">
    <div class="metadata-container">
      <div class="metadata-property">
        <span class="metadata-property-key">title</span>
        <span class="metadata-property-value">NOTES</span>
      </div>
      <div class="metadata-property">
        <span class="metadata-property-key">category</span>
        <span class="metadata-property-value">notes</span>
      </div>
    </div>

    <section class="notes-page">
      <div class="page-header">
        <h1 class="page-title">Saved Notes</h1>
        <a class="nav-link" href="SCRATCHPAD.html">New note</a>
      </div>

      <p class="tag-hint">Save each downloaded note file into the <strong>notes/</strong> folder next to this page. Links below point to <code>notes/your-note.html</code>.</p>

      <p class="count" id="notes-count">Loading…</p>

      <div class="toolbar" style="margin-top:0;margin-bottom:1.25rem;padding-top:0;border-top:none;">
        <button type="button" class="btn" id="download-index-btn">Download index (NOTES.html)</button>
      </div>

      <div id="notes-container"></div>
    </section>
  </main>

  <script src="notes-storage.js"></script>
  <script src="notes-page.js"></script>
</body>
</html>
